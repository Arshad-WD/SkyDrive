spring.datasource.url=${DB_URL:jdbc:postgresql://host.docker.internal:5433/skydrive}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.docker.compose.enabled=false

# jwt
jwt.secret=${JWT_SECRET:ThisIsMySuperSecretKeyForskyDriveJwtAuthentication123456789}
jwt.expiration=8640000

# minio
minio.url=${MINIO_URL:http://host.docker.internal:9000}
minio.access-key=${MINIO_ROOT_USER:admin}
minio.secret-key=${MINIO_ROOT_PASSWORD:password123}
minio.bucket-name=skydrive-file

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379

# ClamAv
clamav.host=clamav
clamav.port=3310

server.port=8080

# Multipart configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB