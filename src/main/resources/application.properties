spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/skydrive}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.docker.compose.enabled=false

# jwt
jwt.secret=${JWT_SECRET:ThisIsMySuperSecretKeyForskyDriveJwtAuthentication123456789}
jwt.expiration=8640000

# minio
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ROOT_USER:admin}
minio.secret-key=${MINIO_ROOT_PASSWORD:password123}
minio.bucket-name=skydrive-file

# Redis (disabled - using simple in-memory cache)
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Cache - use simple in-memory (no Redis required)
spring.cache.type=simple
spring.cache.cache-names=my-files,file-search,folder-tree

# ClamAv
clamav.host=localhost
clamav.port=3310

server.port=8080