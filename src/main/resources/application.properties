spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/skydrive
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.docker.compose.enabled=false

# jwt
jwt.secret=ThisIsMySuperSecretKeyForskyDriveJwtAuthentication123456789
jwt.expiration=8640000

# minio
minio.url=http://localhost:9000
minio.access-key=admin
minio.secret-key=password123
minio.bucket-name=skydrive-file

# Redis (disabled - using simple in-memory cache)
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Cache - use simple in-memory (no Redis required)
spring.cache.type=simple
spring.cache.cache-names=my-files,file-search,folder-tree

# ClamAv
clamav.host=localhost
clamav.port=3310

server.port=8080