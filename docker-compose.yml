services:

  postgres:
    image: postgres:17
    container_name: skydrive-postgres
    environment:
      POSTGRES_DB: skydrive
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}

    ports:
      - "5433:5432"

    volumes:
      - posgtres_data:/var/lib/postgresql/data
      

  minio:
    image: minio/minio
    container_name: skydrive-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio_data:/data

  redis:
    image: redis:7
    container_name: skydrive-redis
    ports:
      - "6379:6379"

  clamav:
    image: clamav/clamav:latest
    container_name: skydrive-clamav

    ports:
      - "3310:3310"
    volumes:
      - ./clamd.conf:/etc/clamav/clamd.conf:ro
    restart: unless-stopped


  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
      - redis
      - clamav


volumes:
  posgtres_data:
  minio_data:
  